events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Docker's embedded DNS — re-resolves upstream hostnames after container restarts.
    # Using $variables in proxy_pass bypasses the startup-time resolution of upstream{} blocks.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name localhost;

        client_max_body_size 55M;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # API & WebSocket → backend (Daphne)
        location /api/ {
            set $upstream_backend backend:8000;
            proxy_pass http://$upstream_backend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin/ {
            set $upstream_backend backend:8000;
            proxy_pass http://$upstream_backend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /ws/ {
            set $upstream_backend backend:8000;
            proxy_pass http://$upstream_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # Media files
        location /media/ {
            alias /app/media/;
            expires 7d;
        }

        # Static files
        location /static/ {
            alias /app/static/;
            expires 30d;
        }

        # Frontend dev server (Vite HMR + hot reload)
        location / {
            set $upstream_frontend frontend:5173;
            proxy_pass http://$upstream_frontend;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }
}
