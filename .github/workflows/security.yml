name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    # ogni lunedì alle 08:00 UTC
    - cron: "0 8 * * 1"

jobs:
  # ── Python dependency audit ─────────────────────────────────────────────────
  pip-audit:
    name: pip-audit (Python deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        working-directory: backend
        run: pip-audit -r requirements.txt --format=markdown >> $GITHUB_STEP_SUMMARY || true

  # ── npm audit ───────────────────────────────────────────────────────────────
  npm-audit:
    name: npm audit (JS deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit npm packages
        working-directory: frontend
        run: npm audit --audit-level=moderate >> $GITHUB_STEP_SUMMARY || true

  # ── Secret scanning (Gitleaks) ──────────────────────────────────────────────
  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
